<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" preserveAspectRatio="xMidYMid slice" role="img" aria-label="Atmospheric hero backdrop">
  <defs>
    <!-- ── Air's hero recipe: 135° sky-purple → peach → cream wash ── -->
    <linearGradient id="sky" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"   stop-color="#a7b7e8"/>
      <stop offset="38%"  stop-color="#c5c0d8"/>
      <stop offset="68%"  stop-color="#f1d7be"/>
      <stop offset="100%" stop-color="#fff8dc"/>
    </linearGradient>

    <!-- ── Warm sun glow in the upper-right quadrant ── -->
    <radialGradient id="sun" cx="78%" cy="22%" r="55%">
      <stop offset="0%"   stop-color="#fff4d2" stop-opacity="0.85"/>
      <stop offset="30%"  stop-color="#ffdcb0" stop-opacity="0.42"/>
      <stop offset="65%"  stop-color="#fbc9a4" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#fbc9a4" stop-opacity="0"/>
    </radialGradient>

    <!-- ── Cool drift from the upper-left for depth ── -->
    <radialGradient id="cool-drift" cx="18%" cy="22%" r="55%">
      <stop offset="0%"   stop-color="#bccae8" stop-opacity="0.55"/>
      <stop offset="55%"  stop-color="#bccae8" stop-opacity="0.10"/>
      <stop offset="100%" stop-color="#bccae8" stop-opacity="0"/>
    </radialGradient>

    <!-- ── Cream wash holding the bottom together ── -->
    <linearGradient id="cream-wash" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#fff8dc" stop-opacity="0"/>
      <stop offset="60%"  stop-color="#fff8dc" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#fff8dc" stop-opacity="0.55"/>
    </linearGradient>

    <!-- ── Cloud highlight (warm-white) ── -->
    <radialGradient id="cloud" cx="50%" cy="48%" r="55%">
      <stop offset="0%"   stop-color="#ffffff" stop-opacity="0.92"/>
      <stop offset="42%"  stop-color="#fff3e0" stop-opacity="0.55"/>
      <stop offset="80%"  stop-color="#f1d9c4" stop-opacity="0.16"/>
      <stop offset="100%" stop-color="#f1d9c4" stop-opacity="0"/>
    </radialGradient>

    <!-- ── Painterly distortion (lighter than the old landscape) ── -->
    <filter id="paint" x="-30%" y="-30%" width="160%" height="160%" color-interpolation-filters="sRGB">
      <feTurbulence type="fractalNoise" baseFrequency="0.012" numOctaves="3" seed="3" result="noise"/>
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="110"/>
      <feGaussianBlur stdDeviation="18"/>
    </filter>

    <filter id="paint-soft" x="-30%" y="-30%" width="160%" height="160%" color-interpolation-filters="sRGB">
      <feTurbulence type="fractalNoise" baseFrequency="0.009" numOctaves="2" seed="14" result="noise"/>
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="80"/>
      <feGaussianBlur stdDeviation="28"/>
    </filter>

    <!-- ── Very faint canvas grain ── -->
    <filter id="grain" x="0" y="0" width="100%" height="100%">
      <feTurbulence type="fractalNoise" baseFrequency="2.6" numOctaves="2" stitchTiles="stitch"/>
      <feColorMatrix type="matrix" values="0 0 0 0 0.35  0 0 0 0 0.30  0 0 0 0 0.28  0 0 0 0.06 0"/>
      <feComposite operator="in" in2="SourceGraphic"/>
    </filter>
  </defs>

  <!-- ── Base diagonal gradient ── -->
  <rect width="1600" height="900" fill="url(#sky)"/>

  <!-- ── Cool drift (upper-left atmosphere) ── -->
  <rect width="1600" height="900" fill="url(#cool-drift)"/>

  <!-- ── Sun glow ── -->
  <rect width="1600" height="900" fill="url(#sun)"/>

  <!-- ── Distant cloud band (very soft) ── -->
  <g filter="url(#paint-soft)" opacity="0.75">
    <ellipse cx="380"  cy="220" rx="420" ry="120" fill="url(#cloud)"/>
    <ellipse cx="1240" cy="320" rx="460" ry="140" fill="url(#cloud)"/>
  </g>

  <!-- ── Foreground cloud highlights ── -->
  <g filter="url(#paint)" opacity="0.85">
    <ellipse cx="220"  cy="180" rx="280" ry="95"  fill="url(#cloud)"/>
    <ellipse cx="900"  cy="160" rx="240" ry="80"  fill="url(#cloud)"/>
    <ellipse cx="1380" cy="260" rx="260" ry="90"  fill="url(#cloud)"/>
    <ellipse cx="720"  cy="380" rx="320" ry="95"  fill="url(#cloud)"/>
  </g>

  <!-- ── Cream wash sealing the bottom ── -->
  <rect width="1600" height="900" fill="url(#cream-wash)"/>

  <!-- ── Whisper of canvas grain ── -->
  <rect width="1600" height="900" fill="white" filter="url(#grain)" opacity="0.45"/>
</svg>
