root = "/app"
tmp_dir = "/tmp/air-consumer"

[build]
  cmd = "go build -tags musl -o /tmp/air-consumer/consumer ./cmd/consumer"
  bin = "/tmp/air-consumer/consumer"
  include_ext = ["go"]
  exclude_dir = [
    "tmp", "web", "tracking", "realtime", "deploy", "docs",
    "test-results", ".git", "node_modules",
  ]
  exclude_regex = ["_test\\.go$"]
  delay = 600
  stop_on_error = true
  send_interrupt = true
  kill_delay = "5s"

[log]
  time = true

[misc]
  clean_on_exit = true
