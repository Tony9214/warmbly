# air config for the backend service (used inside docker-compose dev).
# Watches the entire repo for .go changes, rebuilds cmd/backend, and
# restarts the binary. Tmp output stays inside a writable named-volume
# location so the bind mount root doesn't fill with .tmp files.

root = "/app"
tmp_dir = "/tmp/air-backend"

[build]
  cmd = "go build -tags musl -o /tmp/air-backend/backend ./cmd/backend"
  bin = "/tmp/air-backend/backend"
  include_ext = ["go"]
  exclude_dir = [
    "tmp", "web", "tracking", "realtime", "deploy", "docs",
    "test-results", ".git", "node_modules",
  ]
  exclude_regex = ["_test\\.go$"]
  delay = 600
  stop_on_error = true
  send_interrupt = true
  kill_delay = "5s"

[log]
  time = true

[misc]
  clean_on_exit = true
